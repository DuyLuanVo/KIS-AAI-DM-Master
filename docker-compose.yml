version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_container
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  minio:
    image: minio/minio:latest
    container_name: minio_container
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_storage:/data
    restart: always

  mc:
    image: minio/mc:latest
    container_name: mc_helper
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      if ! /usr/bin/mc ls myminio/kis-keyframes >/dev/null 2>&1; then
        /usr/bin/mc mb myminio/kis-keyframes;
        echo 'Bucket kis-keyframes created successfully.';
      else
        echo 'Bucket kis-keyframes already exists.';
      fi;
      "
